<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Роза и Шип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  :root {
    --cream:   #faf7f2;
    --ivory:   #f2ede4;
    --blush:   #e8d5c4;
    --rose:    #c9856a;
    --deep:    #7a4535;
    --green:   #5a6e4e;
    --dark:    #2a1f1a;
    --muted:   #9e8c82;
    --card-bg: #fffcf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ШАПКА ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--cream);
    border-bottom: 1px solid var(--blush);
    padding: 14px 20px 10px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(10px);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600;
    letter-spacing: 0.02em; color: var(--deep);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-icon { font-size: 18px; }
  /* ── FAB КОРЗИНА ── */
  .fab {
    position: fixed; bottom: 24px; right: 20px; z-index: 150;
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--deep); border: none;
    box-shadow: 0 4px 20px rgba(42,31,26,0.35);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(42,31,26,0.25); }
  .fab-bump { animation: bump 0.3s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes bump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.22); }
    70%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  .fab-badge {
    position: absolute; top: 2px; right: 2px;
    background: var(--rose); color: white;
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 11px; font-weight: 600;
    display: none; align-items: center; justify-content: center;
    border: 2px solid var(--cream);
    font-family: 'Jost', sans-serif;
  }
  .fab-badge.visible { display: flex; }

  /* ── ГЕРОЙ ── */
  .hero {
    background: linear-gradient(135deg, #f5e6d8 0%, #ede0d4 50%, #e8d5c4 100%);
    padding: 32px 20px 28px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '🌸';
    position: absolute; right: -10px; top: -20px;
    font-size: 120px; opacity: 0.12;
    transform: rotate(-20deg);
  }
  .hero-tag {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--rose); font-weight: 500; margin-bottom: 8px;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 300; line-height: 1.1;
    color: var(--deep); margin-bottom: 8px;
  }
  .hero-title em { font-style: italic; color: var(--rose); }
  .hero-sub {
    font-size: 13px; color: var(--muted); line-height: 1.5;
  }
  .hero-badges {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
  }
  .badge {
    background: white; border-radius: 20px;
    padding: 5px 12px; font-size: 12px; color: var(--deep);
    display: flex; align-items: center; gap: 4px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  /* ── КАТЕГОРИИ ── */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400;
    color: var(--deep); padding: 20px 20px 4px;
    letter-spacing: 0.01em;
  }
  .cats {
    display: flex; gap: 8px;
    padding: 12px 20px; overflow-x: auto;
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat {
    flex-shrink: 0;
    background: white; border: 1.5px solid var(--blush);
    border-radius: 24px; padding: 7px 16px;
    font-size: 13px; color: var(--muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .cat.active {
    background: var(--deep); border-color: var(--deep);
    color: white;
  }
  .cat:active { transform: scale(0.95); }

  /* ── СЕТКА ТОВАРОВ ── */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 8px 16px 100px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(42,31,26,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .card:active { transform: scale(0.97); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover; display: block;
    background: var(--ivory);
  }
  .card-body { padding: 10px 12px 12px; }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 400;
    color: var(--dark); line-height: 1.2; margin-bottom: 3px;
  }
  .card-desc {
    font-size: 11px; color: var(--muted);
    line-height: 1.4; margin-bottom: 8px;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-price {
    font-size: 16px; font-weight: 500; color: var(--deep);
  }
  .card-price span { font-size: 11px; font-weight: 300; color: var(--muted); }
  .add-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--rose); border: none;
    color: white; font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .add-btn.added {
    background: var(--green);
  }
  .add-btn:active { transform: scale(0.88); }

  /* ── КОРЗИНА (боттом-шит) ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(42,31,26,0.5);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    z-index: 201; padding: 0 0 40px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 80vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--blush); margin: 12px auto 0;
  }
  .sheet-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 400;
    color: var(--deep); padding: 16px 20px 0;
  }

  .cart-items { padding: 12px 20px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--ivory);
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; color: var(--dark); margin-bottom: 2px; }
  .cart-item-price { font-size: 12px; color: var(--muted); }
  .cart-item-controls {
    display: flex; align-items: center; gap: 10px;
  }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--blush);
    background: white; color: var(--dark);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:active { background: var(--blush); }
  .qty-num { font-size: 14px; font-weight: 500; min-width: 16px; text-align: center; }

  .cart-empty {
    text-align: center; padding: 32px 20px;
    color: var(--muted); font-size: 14px;
  }
  .cart-empty-icon { font-size: 40px; margin-bottom: 8px; }

  .cart-total {
    display: flex; justify-content: space-between;
    align-items: center; padding: 14px 20px;
    border-top: 1px solid var(--blush); margin-top: 4px;
  }
  .cart-total-label { font-size: 14px; color: var(--muted); }
  .cart-total-sum {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; color: var(--deep); font-weight: 600;
  }

  /* ── ФИЛЬТРЫ ПОВОД/БЮДЖЕТ ── */
  .filters {
    padding: 10px 20px 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 11px;
    border: 1px solid var(--blush);
    color: var(--muted);
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-chip.active {
    background: var(--deep);
    border-color: var(--deep);
    color: #fff;
  }

  /* ── ГОТОВЫЕ НАБОРЫ ── */
  .presets {
    padding: 6px 20px 8px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .presets::-webkit-scrollbar { display: none; }
  .preset-card {
    flex-shrink: 0;
    min-width: 180px;
    max-width: 220px;
    background: #fff;
    border-radius: 16px;
    padding: 10px 12px;
    box-shadow: 0 2px 10px rgba(42,31,26,0.08);
    border: 1px solid var(--ivory);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .preset-card:active {
    transform: scale(0.97);
    box-shadow: 0 1px 6px rgba(42,31,26,0.12);
  }
  .preset-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--deep);
    margin-bottom: 2px;
  }
  .preset-tag {
    font-size: 11px;
    color: var(--rose);
    margin-bottom: 6px;
  }
  .preset-desc {
    font-size: 11px;
    color: var(--muted);
  }

  .contact-form {
    padding: 12px 20px 0;
    display: none;
  }
  .contact-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .contact-field {
    width: 100%;
    margin-bottom: 10px;
  }
  .contact-field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .contact-field input,
  .contact-field textarea {
    width: 100%;
    border-radius: 10px;
    border: 1px solid var(--blush);
    padding: 10px 12px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    background: #fff;
    color: var(--dark);
    caret-color: var(--dark);
    resize: vertical;
    min-height: 40px;
  }
  .contact-confirm {
    font-size: 13px;
    color: var(--dark);
    margin: 6px 0 0;
  }

  .order-btn {
    margin: 8px 20px 0;
    width: calc(100% - 40px);
    background: var(--deep); border: none;
    border-radius: 14px; padding: 16px;
    color: white; font-family: 'Jost', sans-serif;
    font-size: 15px; font-weight: 400;
    letter-spacing: 0.04em; cursor: pointer;
    transition: all 0.2s;
    display: block;
  }
  .order-btn:active { opacity: 0.85; transform: scale(0.99); }
  .order-btn:disabled { background: var(--blush); cursor: default; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--dark); color: white;
    border-radius: 24px; padding: 10px 20px;
    font-size: 13px; white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: all 0.3s; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ШАПКА -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">🌹</span>
    Роза и Шип
  </div>

</header>

<!-- ГЕРОЙ -->
<div class="hero">
  <div class="hero-tag">Свежие цветы · Минск</div>
  <h1 class="hero-title">Букеты,<br>от которых<br><em>замирает сердце</em></h1>
  <p class="hero-sub">Составим идеальный букет под ваш повод и бюджет</p>
  <div class="hero-badges">
    <div class="badge">🕘 9:00–21:00</div>
    <div class="badge">🚚 Доставка от 50 BYN</div>
    <div class="badge">🌱 Свежие ежедневно</div>
  </div>
</div>

<!-- КАТЕГОРИИ -->
<div class="section-title">Каталог</div>
<div class="filters">
  <div class="filter-row" id="occasionFilters"></div>
  <div class="filter-row" id="budgetFilters"></div>
</div>
<div class="presets" id="presets"></div>
<div class="cats" id="cats"></div>

<!-- ТОВАРЫ -->
<div class="grid" id="grid"></div>

<!-- FAB КОРЗИНА -->
<button class="fab" id="fab" onclick="openCart()">
  🛒
  <span class="fab-badge" id="cartCount">0</span>
</button>

<!-- ОВЕРЛЕЙ -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- КОРЗИНА -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Ваш букет 🌸</div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total" id="cartTotal" style="display:none">
    <span class="cart-total-label">Итого</span>
    <span class="cart-total-sum" id="cartSum"></span>
  </div>
  <div class="contact-form" id="contactForm">
    <p class="contact-label">Заполните данные для оформления заказа.</p>
    <div class="contact-field">
      <label for="contactName">Имя</label>
      <input id="contactName" type="text" placeholder="Как к вам обращаться">
    </div>
    <div class="contact-field">
      <label for="contactPhone">Телефон</label>
      <input id="contactPhone" type="tel" placeholder="+375 29 000-00-00">
    </div>
    <div class="contact-field">
      <label for="contactDatetime">Дата и время доставки</label>
      <input id="contactDatetime" type="text" placeholder="Например: 8 марта, 18:00">
    </div>
    <div class="contact-field">
      <label for="contactWishes">Цвета и дополнительные пожелания</label>
      <textarea id="contactWishes" placeholder="Желаемые оттенки, формат букета, другие детали"></textarea>
    </div>
    <p class="contact-confirm">Ваши введённые данные верны?</p>
  </div>
  <button class="order-btn" id="orderBtn" onclick="onOrderClick()">Оформить заявку</button>
</div>

<!-- ТОСТ -->
<div class="toast" id="toast"></div>

<script>
// ── ИНИЦИАЛИЗАЦИЯ TELEGRAM ────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // Подстраиваем цвета под тему Telegram
  document.documentElement.style.setProperty('--cream', tg.colorScheme === 'dark' ? '#1a1410' : '#faf7f2');
}

// ── КАТАЛОГ ──────────────────────────────────────────────────────────────────
const catalog = [
  // Букеты — фото с Unsplash (бесплатно, без ограничений)
  { id:1,  cat:'Букеты',   name:'Нежность',        img:'https://images.unsplash.com/photo-1487530811015-780f4c7d3f95?w=400&q=80', desc:'Пионы, эустома, лизиантус',  price:65, occasions:['birthday','anniversary','march8','justbecause'] },
  { id:2,  cat:'Букеты',   name:'Классика',        img:'https://images.unsplash.com/photo-1548094990-c16ca90f1f0d?w=400&q=80', desc:'25 красных роз',              price:85, occasions:['birthday','anniversary','wow'] },
  { id:3,  cat:'Букеты',   name:'Пастель',         img:'https://images.unsplash.com/photo-1457089328109-e5d9bd499191?w=400&q=80', desc:'Тюльпаны, ранункулюсы',      price:55, occasions:['birthday','anniversary','march8','graduation'] },
  { id:4,  cat:'Букеты',   name:'Лесная сказка',   img:'https://images.unsplash.com/photo-1490750967868-88df5691cc46?w=400&q=80', desc:'Полевые цветы и зелень',     price:45, occasions:['justbecause','condolences','graduation'] },
  // Свадьба
  { id:5,  cat:'Свадьба',  name:'Невеста',         img:'https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=400&q=80', desc:'Белые пионы и розы',         price:120, occasions:['wedding','wow'] },
  { id:6,  cat:'Свадьба',  name:'Бутоньерка',      img:'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=400&q=80', desc:'Роза и лаванда',             price:25, occasions:['wedding'] },
  { id:7,  cat:'Свадьба',  name:'Стол невесты',    img:'https://images.unsplash.com/photo-1478146059778-26028b07395a?w=400&q=80', desc:'Композиция со свечами',      price:180, occasions:['wedding','wow'] },
  // Растения
  { id:8,  cat:'Растения', name:'Орхидея',         img:'https://images.unsplash.com/photo-1566907225472-514215c9d88b?w=400&q=80', desc:'Фаленопсис белый, 2 ветки', price:40,  occasions:['justbecause','condolences'] },
  { id:9,  cat:'Растения', name:'Суккуленты',      img:'https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?w=400&q=80', desc:'Набор 3 шт. в кашпо',        price:30,  occasions:['justbecause','office'] },
  { id:10, cat:'Растения', name:'Антуриум',        img:'https://images.unsplash.com/photo-1516048015710-7a3b4c86be43?w=400&q=80', desc:'Красный, в декор. горшке',   price:50,  occasions:['justbecause','anniversary'] },
  // Подарки
  { id:11, cat:'Подарки',  name:'Мыльные розы',    img:'https://images.unsplash.com/photo-1582794543139-8ac9cb0f7b11?w=400&q=80', desc:'Корзина из 19 роз',          price:35, occasions:['quick','birthday','anniversary'], isAddon:true },
  { id:12, cat:'Подарки',  name:'Цветы + конфеты', img:'https://images.unsplash.com/photo-1549007994-cb92caebd54b?w=400&q=80', desc:'Букет + Raffaello 150г',      price:75, occasions:['quick','birthday','wow'], isAddon:true },
];

const categories = ['Все', ...new Set(catalog.map(p => p.cat))];
let activecat = 'Все';
let activeOccasion = 'any';
let activeBudget = 'any';
let cart = {};  // { id: qty }
let contactStep = false; // false — корзина, true — форма контактов

// Поводы и бюджеты для фильтров
const occasions = [
  { id:'any',        label:'Любой повод' },
  { id:'birthday',   label:'День рождения' },
  { id:'wedding',    label:'Свадьба' },
  { id:'anniversary',label:'Годовщина' },
  { id:'march8',     label:'8 марта' },
  { id:'condolences',label:'Соболезнования' },
  { id:'justbecause',label:'Просто так' },
];

const budgets = [
  { id:'any',   label:'Любой бюджет', min:0,   max:Infinity },
  { id:'to50',  label:'До 50 BYN',    min:0,   max:50 },
  { id:'50_100',label:'50–100 BYN',   min:50,  max:100 },
  { id:'100+',  label:'100+ BYN',     min:100, max:Infinity },
];

// Готовые наборы
const presets = [
  {
    id:'quick',
    title:'Быстрый подарок',
    tag:'до 50 BYN',
    desc:'Когда нужно порадовать «прямо сейчас».',
    items:[{id:4, qty:1}, {id:11, qty:1}],
  },
  {
    id:'wow',
    title:'Вау‑эффект',
    tag:'от 100 BYN',
    desc:'Большой букет, который точно запомнят.',
    items:[{id:2, qty:1}, {id:12, qty:1}],
  },
];

// ── РЕНДЕР КАТЕГОРИЙ ──────────────────────────────────────────────────────────
function renderOccasionFilters() {
  const el = document.getElementById('occasionFilters');
  el.innerHTML = occasions.map(o => `
    <button class="filter-chip ${o.id === activeOccasion ? 'active' : ''}" onclick="selectOccasion('${o.id}')">
      ${o.label}
    </button>
  `).join('');
}

function renderBudgetFilters() {
  const el = document.getElementById('budgetFilters');
  el.innerHTML = budgets.map(b => `
    <button class="filter-chip ${b.id === activeBudget ? 'active' : ''}" onclick="selectBudget('${b.id}')">
      ${b.label}
    </button>
  `).join('');
}

function selectOccasion(id) {
  activeOccasion = id;
  renderOccasionFilters();
  renderGrid();
}

function selectBudget(id) {
  activeBudget = id;
  renderBudgetFilters();
  renderGrid();
}

function renderPresets() {
  const el = document.getElementById('presets');
  el.innerHTML = presets.map(p => `
    <div class="preset-card" onclick="applyPreset('${p.id}')">
      <div class="preset-title">${p.title}</div>
      <div class="preset-tag">${p.tag}</div>
      <div class="preset-desc">${p.desc}</div>
    </div>
  `).join('');
}

function applyPreset(id) {
  const preset = presets.find(p => p.id === id);
  if (!preset) return;

  cart = {};
  preset.items.forEach(it => {
    cart[it.id] = (cart[it.id] || 0) + it.qty;
  });
  updateCartUI();
  renderGrid();
  openCart();
}

function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = categories.map(c => `
    <div class="cat ${c === activecat ? 'active' : ''}" onclick="selectCat('${c}')">
      ${c}
    </div>
  `).join('');
}

function selectCat(cat) {
  activecat = cat;
  renderCats();
  renderGrid();
}

// ── РЕНДЕР ТОВАРОВ ────────────────────────────────────────────────────────────
function renderGrid() {
  let items = activecat === 'Все' ? catalog : catalog.filter(p => p.cat === activecat);

  if (activeOccasion !== 'any') {
    items = items.filter(p => !p.occasions || p.occasions.includes(activeOccasion));
  }

  if (activeBudget !== 'any') {
    const b = budgets.find(b => b.id === activeBudget);
    if (b) {
      items = items.filter(p => p.price >= b.min && p.price <= b.max);
    }
  }
  const el = document.getElementById('grid');

  el.innerHTML = items.map((p, i) => {
    const inCart = cart[p.id] > 0;
    return `
    <div class="card" style="animation-delay:${i * 0.05}s">
      <img
        class="card-img"
        src="${p.img}"
        alt="${p.name}"
        loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      />
      <div class="card-img-fallback" style="display:none;aspect-ratio:1;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#f5e6d8,#ede0d4)">🌸</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="card-price">${p.price} <span>BYN</span></div>
          <button class="add-btn ${inCart ? 'added' : ''}" onclick="addToCart(${p.id})" id="btn-${p.id}">
            ${inCart ? '✓' : '+'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── КОРЗИНА ───────────────────────────────────────────────────────────────────
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartUI();

  // Анимация кнопки
  const btn = document.getElementById(`btn-${id}`);
  if (btn) { btn.classList.add('added'); btn.textContent = '✓'; }

  const item = catalog.find(p => p.id === id);
  showToast(`${item.emoji} ${item.name} добавлен`);
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartUI();
  renderCartSheet();

  // Обновляем кнопку на карточке
  const btn = document.getElementById(`btn-${id}`);
  if (btn) {
    const inCart = cart[id] > 0;
    btn.classList.toggle('added', inCart);
    btn.textContent = inCart ? '✓' : '+';
  }
}

function updateCartUI() {
  const total = Object.values(cart).reduce((s, q) => s + q, 0);
  const badge = document.getElementById('cartCount');
  badge.textContent = total;
  badge.classList.toggle('visible', total > 0);
  // Анимация FAB при добавлении товара
  const fab = document.getElementById('fab');
  fab.classList.remove('fab-bump');
  void fab.offsetWidth; // reflow для перезапуска анимации
  fab.classList.add('fab-bump');
}

function renderCartSheet() {
  const ids = Object.keys(cart).map(Number);
  const itemsEl  = document.getElementById('cartItems');
  const totalEl  = document.getElementById('cartTotal');
  const sumEl    = document.getElementById('cartSum');
  const orderBtn = document.getElementById('orderBtn');
  const contactForm = document.getElementById('contactForm');

  if (ids.length === 0) {
    itemsEl.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🌿</div>
        Корзина пустая<br>Добавьте что-нибудь из каталога
      </div>`;
    totalEl.style.display = 'none';
    orderBtn.disabled = true;
    contactForm.style.display = 'none';
    contactStep = false;
    return;
  }

  orderBtn.disabled = false;
  let sum = 0;

  itemsEl.innerHTML = ids.map(id => {
    const p = catalog.find(p => p.id === id);
    const qty = cart[id];
    sum += p.price * qty;
    return `
    <div class="cart-item">
      <img src="${p.img}" alt="${p.name}" style="width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--ivory)"/>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">${p.price} BYN × ${qty} = ${p.price * qty} BYN</div>
      </div>
      <div class="cart-item-controls">
        <button class="qty-btn" onclick="changeQty(${id}, -1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty(${id}, 1)">+</button>
      </div>
    </div>`;
  }).join('');

  totalEl.style.display = 'flex';
  sumEl.textContent = sum + ' BYN';

  renderCartUpsell();
}

function renderCartUpsell() {
  let upsellEl = document.getElementById('cartUpsell');
  if (!upsellEl) {
    const sheet = document.getElementById('sheet');
    upsellEl = document.createElement('div');
    upsellEl.id = 'cartUpsell';
    upsellEl.style.padding = '4px 20px 0';
    upsellEl.style.fontSize = '12px';
    sheet.insertBefore(upsellEl, document.getElementById('orderBtn'));
  }

  const addonItems = catalog.filter(p => p.isAddon);
  const available = addonItems.filter(p => !cart[p.id]);
  if (available.length === 0) {
    upsellEl.innerHTML = '';
    return;
  }

  const rows = available.map(p => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;color:${getComputedStyle(document.documentElement).getPropertyValue('--dark') || '#2a1f1a'}">${p.name}</div>
        <div style="font-size:11px;color:${getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#9e8c82'}">${p.price} BYN · дополнение к заказу</div>
      </div>
      <button class="qty-btn" onclick="addToCart(${p.id})">+</button>
    </div>
  `).join('');

  upsellEl.innerHTML = `
    <div style="margin-top:6px;border-top:1px dashed var(--blush);padding-top:6px;">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Можно добавить к заказу:</div>
      ${rows}
    </div>
  `;
}

function openCart() {
  renderCartSheet();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  // Сброс шага контактов при закрытии
  const contactForm = document.getElementById('contactForm');
  const orderBtn = document.getElementById('orderBtn');
  if (contactForm && orderBtn) {
    contactForm.style.display = 'none';
    orderBtn.textContent = 'Оформить заявку';
    contactStep = false;
  }
}

// ── ОФОРМЛЕНИЕ ЗАЯВКИ ─────────────────────────────────────────────────────────

function onOrderClick() {
  const ids = Object.keys(cart).map(Number);
  if (ids.length === 0) return;

  const contactForm = document.getElementById('contactForm');
  const orderBtn = document.getElementById('orderBtn');

  // Первый шаг — показать форму контактов
  if (!contactStep) {
    contactStep = true;
    contactForm.style.display = 'block';
    orderBtn.textContent = 'Отправить заявку';
    return;
  }

  // Второй шаг — проверяем, что все поля заполнены, и отправляем
  const nameEl = document.getElementById('contactName');
  const phoneEl = document.getElementById('contactPhone');
  const datetimeEl = document.getElementById('contactDatetime');
  const wishesEl = document.getElementById('contactWishes');

  const name = nameEl.value.trim();
  const phone = phoneEl.value.trim();
  const datetime = datetimeEl.value.trim();
  const wishes = wishesEl.value.trim();

  if (!name || !phone || !datetime || !wishes) {
    showToast('Пожалуйста, заполните все поля.');
    return;
  }

  // Простая проверка телефона (форматы +375 / +7 / 80)
  const phoneRe = /(\+375|\+7|80)\s?\d{2,3}\s?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}/;
  if (!phoneRe.test(phone)) {
    showToast('Проверьте правильность телефона.');
    return;
  }

  const fullWishes = `Дата и время: ${datetime}. Пожелания: ${wishes}`;
  sendOrder(name, phone, fullWishes);
}

function sendOrder(name, phone, wishes) {
  const ids = Object.keys(cart).map(Number);
  if (ids.length === 0) return;

  // Формируем текст заявки
  let sum = 0;
  const lines = ids.map(id => {
    const p = catalog.find(p => p.id === id);
    const qty = cart[id];
    sum += p.price * qty;
    return `• ${p.emoji} ${p.name} × ${qty} = ${p.price * qty} BYN`;
  });

  const orderText = `🛒 Заказ из каталога:\n${lines.join('\n')}\n\n💰 Итого: ${sum} BYN\n\n👤 Имя: ${name}\n📞 Телефон: ${phone}\n✏️ Пожелания: ${wishes}`;

  // Отправляем данные в бот через Telegram WebApp API
  if (tg) {
    tg.sendData(JSON.stringify({
      type: 'catalog_order',
      items: ids.map(id => ({
        id,
        name: catalog.find(p => p.id === id).name,
        qty: cart[id],
        price: catalog.find(p => p.id === id).price,
      })),
      total: sum,
      text: orderText,
      name,
      phone,
      wishes,
    }));
  } else {
    // Режим разработки — просто показываем
    alert(orderText);
  }

  closeCart();
  showToast('✅ Заявка отправлена!');
  cart = {};
  updateCartUI();
  renderGrid();
}

// ── ТОСТ ──────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── СТАРТ ─────────────────────────────────────────────────────────────────────
renderOccasionFilters();
renderBudgetFilters();
renderPresets();
renderCats();
renderGrid();
</script>
</body>
</html>
